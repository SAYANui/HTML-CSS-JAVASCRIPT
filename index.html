<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mind-Blowing Buttons</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-wrap: wrap;
            gap: 40px;
            background-color: #0f172a;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* --- Button 1: The Neon Glow --- */
        .btn-1 {
            padding: 15px 30px;
            border: none;
            outline: none;
            color: #fff;
            background: #111;
            cursor: pointer;
            position: relative;
            z-index: 0;
            border-radius: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .btn-1:before {
            content: '';
            background: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            position: absolute;
            top: -2px; left: -2px;
            background-size: 400%;
            z-index: -1;
            filter: blur(5px);
            width: calc(100% + 4px);
            height: calc(100% + 4px);
            animation: glowing 20s linear infinite;
            opacity: 0;
            transition: opacity .3s ease-in-out;
            border-radius: 10px;
        }
        .btn-1:hover:before { opacity: 1; }
        @keyframes glowing {
            0% { background-position: 0 0; }
            50% { background-position: 400% 0; }
            100% { background-position: 0 0; }
        }

        /* --- Button 2: The Liquid Fill --- */
        .btn-2 {
            position: relative;
            padding: 15px 35px;
            background: transparent;
            font-size: 18px;
            font-weight: 700;
            color: #00e5ff;
            border: 2px solid #00e5ff;
            text-transform: uppercase;
            transition: 0.5s;
            overflow: hidden;
            cursor: pointer;
        }
        .btn-2:hover {
            color: #111;
        }
        .btn-2::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: #00e5ff;
            transition: 0.5s;
            z-index: -1;
        }
        .btn-2:hover::before { left: 0; }

        /* --- Button 3: The 3D Push --- */
        .btn-3 {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 15px;
            background: #6366f1;
            color: white;
            box-shadow: 0 9px #4338ca;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.1s;
        }
        .btn-3:active {
            box-shadow: 0 5px #4338ca;
            transform: translateY(4px);
        }

        /* --- Button 4: The Cyber-Glass --- */
        .btn-4 {
            padding: 15px 30px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: white;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .btn-4:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1) rotate(3deg);
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <button class="btn-1">Button 1</button>
    <button class="btn-2">Button 2</button>
    <button class="btn-3">Button 3</button>
    <button class="btn-4">Button 4</button>

</body>
</html>
