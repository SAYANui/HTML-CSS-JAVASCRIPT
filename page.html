<!DOCTYPE html>
<html>
<head>
<style>
  .custom-button {
    /* Layout & Spacing */
    display: inline-block;
    padding: 12px 32px;
    
    /* Typography */
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: #ffffff;
    text-align: center;
    text-decoration: none;
    
    /* Styling */
    background: linear-gradient(135deg, #6e8efb, #a777e3);
    border: none;
    border-radius: 50px;
    cursor: pointer;
    
    /* Effects */
    box-shadow: 0 4px 15px rgba(110, 142, 251, 0.4);
    transition: all 0.3s ease;
    outline: none;
  }

  /* Hover State: Grows slightly and glows more */
  .custom-button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(110, 142, 251, 0.6);
    background: linear-gradient(135deg, #5a7df9, #965df0);
  }

  /* Active State: "Pushes" down when clicked */
  .custom-button:active {
    transform: translateY(0);
    box-shadow: 0 2px 10px rgba(110, 142, 251, 0.4);
  }
</style>
</head>
<body>

  <button class="custom-button">Get Started</button>

</body>
</html>
