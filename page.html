<!DOCTYPE html>
<html>
<head>
<style>
  :root {
    --cyan: #00ffff;
    --violet: #bd00ff;
    --bg: #0d1117;
  }

  body {
    background-color: var(--bg);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  .mind-blowing-btn {
    position: relative;
    padding: 18px 45px;
    font-size: 20px;
    font-weight: 800;
    color: white;
    text-transform: uppercase;
    letter-spacing: 3px;
    background: rgba(255, 255, 255, 0.05); /* Glass core */
    backdrop-filter: blur(10px);
    border: 2px solid rgba(0, 255, 255, 0.3);
    border-radius: 12px;
    cursor: pointer;
    overflow: hidden;
    transition: all 0.5s ease;
    box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
  }

  /* The Glowing Background Gradient */
  .mind-blowing-btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(189, 0, 255, 0.4), transparent);
    transition: 0.5s;
  }

  /* Hover Effects */
  .mind-blowing-btn:hover {
    color: var(--cyan);
    border-color: var(--cyan);
    box-shadow: 0 0 15px var(--cyan), 
                0 0 40px var(--violet);
    transform: translateY(-3px) scale(1.05);
  }

  .mind-blowing-btn:hover::before {
    left: 100%;
  }

  /* The Neon Pulse Circle */
  .mind-blowing-btn::after {
    content: '';
    position: absolute;
    width: 10px;
    height: 10px;
    background: var(--cyan);
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    opacity: 0;
    transition: all 0.6s ease;
  }

  .mind-blowing-btn:active::after {
    transform: translate(-50%, -50%) scale(20);
    opacity: 0;
  }

</style>
</head>
<body>

  <button class="mind-blowing-btn">
    Launch Project
  </button>

</body>
</html>
